<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>我的 QRCode</title>
  <link rel="stylesheet" href="styles.css">
  <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
</head>
<body>
  <div class="page-shell narrow-shell">
    <main class="content-card centered-card">
      <h1>我的 QRCode</h1>
      <p class="description">請讓對方掃描此 QRCode，以表達感謝或鼓勵。</p>
      <div id="myAccountDisplay" class="qr-account-display"></div>
      <div id="myQrCodeBox" class="qr-box"></div>
      <p id="myQrMessage" class="status-message"></p>
      <div class="action-row">
        <button id="editAccountBtn" class="btn btn-secondary">修改帳號</button>
        <a href="index.html" class="btn btn-primary">回到主畫面</a>
      </div>
    </main>
  </div>

  <script src="config.js"></script>
  <script src="myqrcode.js"></script>
</body>
</html>
