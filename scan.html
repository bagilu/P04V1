<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>掃描他人 QRCode</title>
  <link rel="stylesheet" href="styles.css">
  <script src="https://cdn.jsdelivr.net/npm/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
  <div class="page-shell narrow-shell">
    <main class="content-card centered-card">
      <h1>掃描他人 QRCode</h1>
      <p id="scannerNotice" class="status-message"></p>
      <div id="reader" class="reader-box"></div>
      <p id="scanStatusMessage" class="status-message"></p>

      <section id="scanResultBlock" class="scan-result-block hidden">
        <h2>掃描結果</h2>
        <p>對象帳號：<strong id="targetAccountText"></strong><span class="inline-domain">@gms.tcu.edu.tw</span></p>
        <div class="feedback-grid">
          <button class="btn btn-feedback feedback-btn" data-type="溫馨笑容">溫馨笑容</button>
          <button class="btn btn-feedback feedback-btn" data-type="親切態度">親切態度</button>
          <button class="btn btn-feedback feedback-btn" data-type="其他感謝或鼓勵">其他感謝或鼓勵</button>
        </div>
      </section>

      <div class="action-row">
        <button id="restartScanBtn" class="btn btn-secondary hidden">重新掃描</button>
        <a href="index.html" class="btn btn-primary">回到主畫面</a>
      </div>
    </main>
  </div>

  <script src="config.js"></script>
  <script src="scan.js"></script>
</body>
</html>
